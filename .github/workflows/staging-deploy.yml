name: Deploy Staging

on:
  push:
    branches: [staging]

jobs:
  deploy:
    name: Deploy to Railway (Staging)
    runs-on: ubuntu-latest
    environment: staging
    steps:
      - uses: actions/checkout@v4

      - name: Install Railway CLI
        run: |
          curl -sSL -o /tmp/railway.tar.gz \
            https://github.com/railwayapp/cli/releases/download/v4.59.0/railway-v4.59.0-x86_64-unknown-linux-musl.tar.gz
          tar xzf /tmp/railway.tar.gz -C /tmp
          sudo mv /tmp/railway /usr/local/bin/railway
          railway --version

      # Both Dockerfiles use repo-root-relative paths (COPY backend/...,
      # COPY app/...), so railway up must run from the repo root. The
      # RAILWAY_DOCKERFILE_PATH env var on each Railway service picks
      # the right Dockerfile.
      - name: Deploy Backend
        run: railway up --service backend --detach
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}

      - name: Deploy Frontend
        run: railway up --service frontend --detach
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
