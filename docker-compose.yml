services:
  postgres:
    image: postgres:16-alpine
    container_name: gable_postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-gable_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-gable_password}
      POSTGRES_DB: ${POSTGRES_DB:-gable_db}
    ports:
      - "127.0.0.1:5434:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-gable_user} -d ${POSTGRES_DB:-gable_db}" ]
      interval: 5s
      timeout: 5s
      retries: 5

  nats:
    image: nats:2.10-alpine
    container_name: gable_nats
    command: "-js -m 8222" # Enable JetStream and HTTP monitoring
    ports:
      - "127.0.0.1:4222:4222"
      - "127.0.0.1:8222:8222"
    volumes:
      - nats_data:/data
    restart: unless-stopped
    healthcheck:
      test: [ "CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:8222/healthz || exit 1" ]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  nats_data:
